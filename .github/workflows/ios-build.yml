name: iOS Build (Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🏗️ Build Web Assets (Next.js)
        run: npm run build

      - name: 🔄 Sync Capacitor iOS
        run: npx cap sync ios

      - name: 🍎 Build iOS App (Simulator / No Signature)
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
