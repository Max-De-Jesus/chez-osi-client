name: iOS Build (Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🏗️ Build Web Assets (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fchaqztuduvxzhfmygbl.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaGFxenR1ZHV2eHpoZm15Z2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDE5NjcsImV4cCI6MjA5OTUxNzk2N30.xkmVLt9zutS2Ajg_tZebauB5VTiZEVbVzAHDFKrxuiA

      - name: 🔄 Sync Capacitor iOS
        run: npx cap sync ios

      - name: 🍎 Build iOS App (Simulator / No Signature)
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
